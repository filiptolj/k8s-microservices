image:
  repository: filee/task
  tag: service2-latest
  pullPolicy: Always

replicaCount: 1
containerPort: 8080

service:
  port: 8080

config:
  service1URL: http://service1:8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false

probes:
  readiness:
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
