{{/*
Only create the secret if it doesn't already exist.
This prevents the cert from being regenerated on every helm upgrade.
*/}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace .Values.tls.secretName }}
{{- if not $existingSecret }}
{{- $cert := genSelfSignedCert .Values.host nil (list .Values.host) (int .Values.tls.certDays) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.tls.secretName }}
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
